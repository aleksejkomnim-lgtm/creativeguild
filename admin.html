<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кабинет Магистра | Creative Guild</title>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: sans-serif; margin: 0; padding: 20px; }
        .admin-container { max-width: 1000px; margin: 0 auto; background: #1e293b; padding: 20px; border-radius: 8px; border: 1px solid #475569; }
        h1 { color: #ffd700; text-align: center; border-bottom: 1px solid #475569; padding-bottom: 15px; }
        .section { margin-top: 30px; }
        .admin-btn { background: #ef4444; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; }
        .admin-btn:hover { background: #dc2626; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #334155; }
        th { color: #38bdf8; }
    </style>
</head>
<body>

<div class="admin-container">
    <h1>👁️ Кабинет Магистра</h1>
    
    <div class="section">
        <h2 style="color: #f8fafc;">Управление контрактами</h2>
        <table>
            <thead>
                <tr>
                    <th>Название контракта</th>
                    <th>Заказчик (Telegram)</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody id="admin-contracts-list">
                <tr>
                    <td colspan="3" style="text-align: center; color: #94a3b8;">Загрузка контрактов из облака...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>


<script type="module">
    // 1. Импортируем нужные заклинания Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // 2. ВСТАВЬТЕ СВОЙ firebaseConfig СЮДА (скопируйте из index.html)
        const firebaseConfig = {
        apiKey: "AIzaSyAnOK6tu3LC4NN1NA34-5ujwVnDPSjc2K8",
        authDomain: "creativeguild.firebaseapp.com",
        projectId: "творческая гильдия",
        storageBucket: "creativeguild.firebasestorage.app",
        messagingSenderId: "813913714015",
        appId: "1:813913714015:web:455a4675b5f0e758e59aea",
        measurementId: "G-C94DMDTOKV"
    };

    // 3. Инициализируем базу данных
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 4. Функция загрузки всех контрактов из базы
    async function loadAdminContracts() {
        const list = document.getElementById('admin-contracts-list');
        list.innerHTML = '<tr><td colspan="3" style="text-align: center; color: #94a3b8;">Связь с Архивом...</td></tr>';

        try {
            const querySnapshot = await getDocs(collection(db, "contracts"));
            list.innerHTML = '';

            if (querySnapshot.empty) {
                list.innerHTML = '<tr><td colspan="3" style="text-align: center; color: #94a3b8;">Доска контрактов пуста.</td></tr>';
                return;
            }

            // Отрисовываем каждый заказ в виде строки таблицы
            querySnapshot.forEach((documentSnapshot) => {
                const data = documentSnapshot.data();
                const docId = documentSnapshot.id; // Уникальный ID заказа в базе

                const row = `
                    <tr>
                        <td style="color: #cbd5e1;">
                            <strong style="color: #ffd700;">${data.title}</strong><br>
                            <small style="color: #64748b;">${data.description.substring(0, 60)}...</small>
                        </td>
                        <td style="color: #38bdf8;">@${data.contact}</td>
                        <td>
                            <button class="admin-btn" onclick="deleteContract('${docId}')">❌ Удалить</button>
                        </td>
                    </tr>
                `;
                list.innerHTML += row;
            });
        } catch (e) {
            console.error("Ошибка загрузки в админке: ", e);
            list.innerHTML = '<tr><td colspan="3" style="text-align: center; color: #ef4444;">Ошибка связи с базой данных.</td></tr>';
        }
    }

    // 5. Функция удаления контракта (привязана к window для работы из HTML)
    window.deleteContract = async function(docId) {
        // Запрашиваем подтверждение, чтобы не удалить случайно
        if(confirm('Магистр, вы уверены, что хотите навсегда стереть этот контракт из Архива?')) {
            try {
                // Уничтожаем документ по его ID
                await deleteDoc(doc(db, "contracts", docId));
                alert('Контракт успешно обращен в пепел!');
                
                // Сразу обновляем таблицу
                loadAdminContracts(); 
            } catch (e) {
                console.error("Ошибка удаления: ", e);
                alert('Темные силы помешали удалению. Проверьте консоль.');
            }
        }
    };

    // 6. Запускаем загрузку таблицы сразу при открытии Кабинета
    window.onload = loadAdminContracts;
</script>

</script>

</body>
</html>
